<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chá de Casa Nova</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#FAF7F2;
    }

    header {
      padding:15px;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #ddd;
    }

    .grid {
      padding:15px;
      display:grid;
      gap:10px;
    }

    .card {
      background:#fff;
      padding:15px;
      border-radius:10px;
      border:1px solid #ddd;
    }

    button {
      padding:10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      background:black;
      color:white;
    }

    .danger {
      background:red;
    }
  </style>
</head>

<body>

<header>
  <div>🎁 Lista de Presentes</div>
  <button id="adminBtn">Admin</button>
</header>

<div id="statusPill">Carregando...</div>

<div class="grid" id="grid"></div>

<div id="err"></div>

<script type="module" src="./app.js"></script>

</body>
</html>
