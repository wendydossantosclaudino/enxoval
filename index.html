<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chá de Casa Nova • Lista de Presentes</title>

  <style>
    :root{
      --black:#111111;
      --offwhite:#FAF7F2;
      --beige:#E7D8C9;
      --gray:#6B7280;
      --bamboo:#C7A96B;

      --bg: var(--offwhite);
      --text: var(--black);
      --muted:#4B5563;
      --line: rgba(17,17,17,.10);

      --btnBg: var(--black);
      --btnText: var(--offwhite);

      --danger:#B91C1C;
      --shadow: 0 10px 30px rgba(17,17,17,.10);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui;
      background:
        radial-gradient(1200px 800px at 10% -10%, rgba(199,169,107,.28), transparent 55%),
        radial-gradient(900px 700px at 110% 10%, rgba(231,216,201,.35), transparent 55%),
        var(--bg);
      color:var(--text);
    }

    .top{
      position:sticky; top:0;
      background:rgba(250,247,242,.92);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);
    }

    .wrap{max-width:980px;margin:0 auto;padding:16px}

    header{
      display:flex; justify-content:space-between;
      align-items:center;
    }

    h1{margin:0;font-size:18px}

    .sub{font-size:12px;color:var(--muted)}

    .btnSmall{
      padding:8px 10px;
      border-radius:12px;
      border:none;
      background:var(--btnBg);
      color:var(--btnText);
      cursor:pointer;
    }

    .heroCard{
      border:1px solid var(--line);
      background:#fff;
      border-radius:18px;
      padding:14px;
      box-shadow: var(--shadow);
    }

    .grid{
      display:grid;
      gap:10px;
      padding:16px;
    }

    .card{
      border:1px solid var(--line);
      background:#fff;
      border-radius:18px;
      padding:14px;
      box-shadow: var(--shadow);
    }

    .title{font-weight:800}
    .meta{font-size:12px;color:var(--muted)}
    .price{font-weight:900}

    .badge{
      margin-top:10px;
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
    }

    .ok{color:#0F766E}
    .lock{color:#7A5C2E}

    .actions{margin-top:10px}

    .actionBtn{
      padding:10px 12px;
      border-radius:14px;
      border:none;
      background:var(--btnBg);
      color:var(--btnText);
      cursor:pointer;
    }

    .danger{
      background:var(--danger);
    }

    #statusPill{
      padding:10px 16px;
      font-size:12px;
      color:var(--muted);
    }

    #err{
      padding:10px 16px;
      color:#B91C1C;
      font-size:12px;
    }
  </style>
</head>

<body>

<div class="top">
  <div class="wrap">
    <header>
      <div>
        <h1>🧺 Chá de Casa Nova • Lista de Presentes</h1>
        <div class="sub">
          Escolha um item e reserve, pode reservar mais de um rs💛
        </div>
      </div>

      <button class="btnSmall" id="adminBtn">Admin</button>
    </header>
  </div>
</div>

<div class="wrap">
  <div class="heroCard">
    💛 Oi! Nós somos o Léo & Wendy — obrigado por fazer parte desse momento!
  </div>
</div>

<div id="statusPill">Conectando...</div>

<div class="wrap">
  <div class="grid" id="grid"></div>
</div>

<div id="err"></div>

<script type="module" src="./app.js"></script>

</body>
</html>
